name: Fetch IAH Wait Times

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch wait times and append to log
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          response=$(curl -s \
            -H "Api-Key: $API_KEY" \
            -H "Api-Version: 120" \
            -H "Content-Type: application/json" \
            "https://api.houstonairports.mobi/wait-times/checkpoint/iah")

          timestamp=$(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M:%S')

          echo "$response" | python3 -c "
          import json, sys

          data = json.load(sys.stdin)
          wait_times = data['data']['wait_times']
          checkpoints = [wt for wt in wait_times if 'fis' not in (wt.get('attributes') or [])]

          parts = []
          for cp in checkpoints:
              name = cp['name']
              wait_min = cp['waitSeconds'] // 60 if cp['waitSeconds'] is not None else None
              is_open = cp['isOpen']
              if not is_open:
                  parts.append(f'{name}: CLOSED')
              elif wait_min is not None:
                  parts.append(f'{name}: {wait_min} min')
              else:
                  parts.append(f'{name}: N/A')

          if parts:
              print('$timestamp  ' + '  |  '.join(parts))
          else:
              print('$timestamp  No checkpoints available')
          " >> iah-wait-times.log

      - name: Install matplotlib
        run: pip install matplotlib

      - name: Generate today's graph
        run: |
          python3 << 'PYEOF'
          import re
          from collections import defaultdict
          from datetime import datetime, timedelta, timezone

          import matplotlib
          matplotlib.use("Agg")
          import matplotlib.pyplot as plt
          import matplotlib.dates as mdates

          PT = timezone(timedelta(hours=-7))
          CT = timezone(timedelta(hours=-5))
          today_ct = datetime.now(CT).date()

          terminal_data = defaultdict(lambda: {"times": [], "waits": []})

          with open("iah-wait-times.log") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  ts_match = re.match(r"(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})", line)
                  if not ts_match:
                      continue
                  ts_pt = datetime.strptime(ts_match.group(1), "%Y-%m-%d %H:%M:%S").replace(tzinfo=PT)
                  ts_ct = ts_pt.astimezone(CT)
                  if ts_ct.date() != today_ct:
                      continue
                  rest = line[len(ts_match.group(0)):].strip()
                  for entry in rest.split("  |  "):
                      entry = entry.strip()
                      m = re.match(r"(.+?):\s*(\d+)\s*min", entry)
                      if m:
                          terminal_data[m.group(1).strip()]["times"].append(ts_ct)
                          terminal_data[m.group(1).strip()]["waits"].append(int(m.group(2)))
                      m2 = re.match(r"(.+?):\s*CLOSED", entry)
                      if m2:
                          terminal_data[m2.group(1).strip()]["times"].append(ts_ct)
                          terminal_data[m2.group(1).strip()]["waits"].append(None)

          if not terminal_data:
              print("No data for today, skipping graph.")
              raise SystemExit(0)

          BG = "#0f172a"
          CARD_BG = "#1e293b"
          TEXT = "#e2e8f0"
          GRID = "#334155"
          COLORS = ["#60a5fa", "#f97316", "#4ade80", "#f472b6", "#a78bfa", "#facc15"]
          DASHES = [(None, None), (8, 3), (4, 3), (2, 2), (8, 3, 2, 3), (4, 2, 2, 2)]

          fig, ax = plt.subplots(figsize=(14, 6.5), facecolor=BG)
          ax.set_facecolor(CARD_BG)

          for i, (name, data) in enumerate(sorted(terminal_data.items())):
              times, waits = data["times"], data["waits"]
              color = COLORS[i % len(COLORS)]
              dash = DASHES[i % len(DASHES)]
              seg_times, seg_waits, cur_t, cur_w = [], [], [], []
              for t, w in zip(times, waits):
                  if w is not None:
                      cur_t.append(t); cur_w.append(w)
                  else:
                      if cur_t: seg_times.append(cur_t); seg_waits.append(cur_w)
                      cur_t, cur_w = [], []
              if cur_t: seg_times.append(cur_t); seg_waits.append(cur_w)

              is_last_seg = len(seg_times)
              for j, (st, sw) in enumerate(zip(seg_times, seg_waits)):
                  kwargs = dict(color=color, linewidth=2.5, marker="o", markersize=3,
                                label=name if j == 0 else None, zorder=2 + i, alpha=0.9)
                  if dash[0] is not None:
                      kwargs["dashes"] = dash
                  ax.plot(st, sw, **kwargs)

                  # Label the last data point of the last segment
                  if j == is_last_seg - 1 and sw:
                      last_wait = sw[-1]
                      last_time = st[-1]
                      ax.annotate(f"{last_wait} min", (last_time, last_wait),
                                  textcoords="offset points", xytext=(10, 5),
                                  fontsize=11, fontweight="bold", color=color, zorder=10)

          ax.set_xlabel("Time (Central)", color=TEXT, fontsize=12)
          ax.set_ylabel("Wait Time (minutes)", color=TEXT, fontsize=12)
          ax.set_title(
              f"IAH Security Checkpoint Wait Times — {today_ct.strftime('%A, %B %-d, %Y')} (CT)",
              color=TEXT, fontsize=14, fontweight="bold", pad=16)
          ax.set_ylim(bottom=0)
          ax.grid(True, color=GRID, alpha=0.5, linewidth=0.5)
          ax.tick_params(colors=TEXT, labelsize=10)
          for spine in ax.spines.values():
              spine.set_color(GRID)
          ax.xaxis.set_major_formatter(mdates.DateFormatter("%H:%M", tz=CT))
          ax.xaxis.set_major_locator(mdates.AutoDateLocator())
          fig.autofmt_xdate()

          ax.legend(loc="upper center", bbox_to_anchor=(0.5, -0.15), ncol=len(terminal_data),
                    facecolor=CARD_BG, edgecolor=GRID, labelcolor=TEXT, fontsize=11)

          plt.tight_layout()
          plt.subplots_adjust(bottom=0.18)
          plt.savefig("iah-wait-times-today.png", dpi=150, facecolor=BG, edgecolor="none")
          print("Graph saved.")
          PYEOF


      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iah-wait-times.log iah-wait-times-today.png
          git diff --cached --quiet || git commit -m "update wait times"
          git push
