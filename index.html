<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAH Security Wait Times</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .status-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 200px;
        }
        .status-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        .status-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .status-value.live { color: #4ade80; }
        .current-waits {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .wait-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-align: center;
            min-width: 180px;
            flex: 1;
            max-width: 280px;
        }
        .wait-card .terminal-name {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        .wait-card .wait-value {
            font-size: 2rem;
            font-weight: 700;
        }
        .wait-card .wait-unit {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }
        .wait-low { color: #4ade80; }
        .wait-med { color: #facc15; }
        .wait-high { color: #f97316; }
        .wait-extreme { color: #ef4444; }
        .wait-closed { color: #64748b; }
        .graph-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
        }
        .graph-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
        }
        @media (max-width: 640px) {
            .chart-container {
                height: 300px;
            }
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #475569;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IAH Security Wait Times</h1>
            <p class="subtitle">George Bush Intercontinental Airport — Houston, TX</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Status</div>
                <div class="status-value live" id="status">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Last Updated (CT)</div>
                <div class="status-value" id="last-updated">Loading...</div>
            </div>
        </div>

        <div class="current-waits" id="current-waits"></div>

        <div class="graph-card">
            <h2>Today's Wait Times</h2>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <footer>
            Data sourced from <a href="https://www.fly2houston.com/iah/security/">fly2houston.com</a><br>
            Updated every 5 minutes via <a href="https://github.com/adonnell6/iah-wait-times">GitHub Actions</a>
        </footer>
    </div>

    <script>
        const COLORS = ['#60a5fa', '#f97316', '#4ade80', '#f472b6', '#a78bfa', '#facc15'];

        // Convert a Date to a "YYYY-MM-DD" string in Central Time
        function toCentralDateStr(date) {
            return date.toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });
        }

        // Convert a Date to Central Time display parts
        function toCentralParts(date) {
            return {
                dateStr: toCentralDateStr(date),
                display: date.toLocaleString('en-US', {
                    timeZone: 'America/Chicago',
                    month: 'short', day: 'numeric',
                    hour: 'numeric', minute: '2-digit',
                    hour12: true
                })
            };
        }

        function waitColor(min) {
            if (min <= 15) return 'wait-low';
            if (min <= 45) return 'wait-med';
            if (min <= 90) return 'wait-high';
            return 'wait-extreme';
        }

        async function loadData() {
            const res = await fetch('iah-wait-times.log?t=' + Date.now());
            const text = await res.text();
            const lines = text.trim().split('\n').filter(l => l.trim());

            const todayStr = toCentralDateStr(new Date());
            const terminals = {};

            for (const line of lines) {
                const tsMatch = line.match(/^(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2})/);
                if (!tsMatch) continue;

                // Parse as Pacific Time
                const ptDate = new Date(tsMatch[1] + 'T' + tsMatch[2] + '-07:00');

                // Check if this timestamp falls on "today" in Central Time
                if (toCentralDateStr(ptDate) !== todayStr) continue;

                const rest = line.substring(19).trim();
                for (const entry of rest.split('  |  ')) {
                    const minMatch = entry.trim().match(/(.+?):\s*(\d+)\s*min/);
                    if (minMatch) {
                        const name = minMatch[1].trim();
                        if (!terminals[name]) terminals[name] = [];
                        terminals[name].push({ x: new Date(ptDate.getTime() + 2 * 3600000), y: parseInt(minMatch[2]) });
                    }
                }
            }

            // Update status from last line
            const lastLine = lines[lines.length - 1];
            const lastTs = lastLine.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
            if (lastTs) {
                const pt = new Date(lastTs[1].replace(' ', 'T') + '-07:00');
                const parts = toCentralParts(pt);
                document.getElementById('last-updated').textContent = parts.display;
            }

            // Current wait cards
            const lastRest = lastLine.substring(19).trim();
            const container = document.getElementById('current-waits');
            container.innerHTML = '';
            let hasData = false;

            for (const entry of lastRest.split('  |  ')) {
                const minMatch = entry.trim().match(/(.+?):\s*(\d+)\s*min/);
                const closedMatch = entry.trim().match(/(.+?):\s*CLOSED/);
                if (minMatch) {
                    hasData = true;
                    const name = minMatch[1].trim().replace('IAH ', '');
                    const mins = parseInt(minMatch[2]);
                    container.innerHTML += `
                        <div class="wait-card">
                            <div class="terminal-name">${name}</div>
                            <div class="wait-value ${waitColor(mins)}">${mins}<span class="wait-unit"> min</span></div>
                        </div>`;
                } else if (closedMatch) {
                    const name = closedMatch[1].trim().replace('IAH ', '');
                    container.innerHTML += `
                        <div class="wait-card">
                            <div class="terminal-name">${name}</div>
                            <div class="wait-value wait-closed">Closed</div>
                        </div>`;
                }
            }

            document.getElementById('status').textContent = hasData ? 'Live' : 'No Data';
            document.getElementById('status').className = 'status-value' + (hasData ? ' live' : '');

            // Build chart
            const datasets = Object.keys(terminals).sort().map((name, i) => ({
                label: name,
                data: terminals[name],
                borderColor: COLORS[i % COLORS.length],
                backgroundColor: COLORS[i % COLORS.length] + '33',
                borderWidth: 2.5,
                pointRadius: 2,
                pointHoverRadius: 6,
                tension: 0.1,
                fill: false,
            }));

            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#e2e8f0', padding: 20, font: { size: 13 } }
                        },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#e2e8f0',
                            bodyColor: '#e2e8f0',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: {
                                title: ctx => {
                                    const d = new Date(ctx[0].parsed.x);
                                    return d.toLocaleTimeString('en-US', {
                                        hour: 'numeric', minute: '2-digit', hour12: true
                                    });
                                },
                                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} min`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'hour', displayFormats: { hour: 'h a' } },
                            ticks: { color: '#94a3b8', font: { size: 11 } },
                            grid: { color: '#334155', lineWidth: 0.5 },
                            title: { display: true, text: 'Time (Central)', color: '#e2e8f0', font: { size: 13 } }
                        },
                        y: {
                            min: 0,
                            ticks: { color: '#94a3b8', font: { size: 11 } },
                            grid: { color: '#334155', lineWidth: 0.5 },
                            title: { display: true, text: 'Wait Time (minutes)', color: '#e2e8f0', font: { size: 13 } }
                        }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
