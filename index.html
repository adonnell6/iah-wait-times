<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAH Security Wait Times</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .status-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 200px;
        }
        .status-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        .status-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .status-value.live { color: #4ade80; }
        .current-waits {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .wait-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-align: center;
            min-width: 180px;
            flex: 1;
            max-width: 280px;
        }
        .wait-card .terminal-name {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        .wait-card .wait-value {
            font-size: 2rem;
            font-weight: 700;
        }
        .wait-card .wait-unit {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }
        .wait-low { color: #4ade80; }
        .wait-med { color: #facc15; }
        .wait-high { color: #f97316; }
        .wait-extreme { color: #ef4444; }
        .wait-closed { color: #64748b; }
        .graph-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
        }
        .graph-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
        }
        @media (max-width: 640px) {
            .chart-container {
                height: 300px;
            }
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #475569;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IAH Security Wait Times</h1>
            <p class="subtitle">George Bush Intercontinental Airport — Houston, TX</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Status</div>
                <div class="status-value live" id="status">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Last Updated (CT)</div>
                <div class="status-value" id="last-updated">Loading...</div>
            </div>
        </div>

        <div class="current-waits" id="current-waits"></div>

        <div class="graph-card">
            <h2>Today's Wait Times</h2>
            <div class="chart-container">
                <canvas id="chart-today"></canvas>
            </div>
        </div>

        <div class="graph-card">
            <h2>Today vs Yesterday</h2>
            <div class="chart-container">
                <canvas id="chart-compare"></canvas>
            </div>
        </div>

        <footer>
            Data sourced from <a href="https://www.fly2houston.com/iah/security/">fly2houston.com</a><br>
            Updated every 5 minutes via <a href="https://github.com/adonnell6/iah-wait-times">GitHub Actions</a>
        </footer>
    </div>

    <script>
        const COLORS = ['#60a5fa', '#f97316', '#4ade80', '#f472b6', '#a78bfa', '#facc15'];

        function toCentralDateStr(date) {
            return date.toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });
        }

        // Convert a Date to decimal hours in Central Time (e.g. 2:30 PM = 14.5)
        function toCentralHours(date) {
            const ctStr = date.toLocaleString('en-US', {
                timeZone: 'America/Chicago',
                hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const parts = ctStr.split(':');
            return parseInt(parts[0]) + parseInt(parts[1]) / 60 + parseInt(parts[2]) / 3600;
        }

        function formatHour(val) {
            const h = Math.floor(val);
            if (h === 0 || h === 24) return '12 AM';
            if (h === 12) return '12 PM';
            return h > 12 ? (h - 12) + ' PM' : h + ' AM';
        }

        function formatTime(val) {
            const h = Math.floor(val);
            const m = String(Math.round((val - h) * 60)).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
            return `${h12}:${m} ${ampm} CT`;
        }

        function waitColor(min) {
            if (min <= 15) return 'wait-low';
            if (min <= 45) return 'wait-med';
            if (min <= 90) return 'wait-high';
            return 'wait-extreme';
        }

        function getCentralDays() {
            const now = new Date();
            const todayStr = toCentralDateStr(now);
            const yesterdayStr = toCentralDateStr(new Date(now.getTime() - 24 * 3600000));
            return { todayStr, yesterdayStr };
        }

        function makeChartOptions() {
            return {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#e2e8f0', padding: 16, font: { size: 12 }, usePointStyle: true, pointStyleWidth: 20 }
                    },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleColor: '#e2e8f0',
                        bodyColor: '#e2e8f0',
                        borderColor: '#334155',
                        borderWidth: 1,
                        callbacks: {
                            title: ctx => formatTime(ctx[0].parsed.x),
                            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} min`
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'linear',
                        min: 0,
                        max: 24,
                        ticks: {
                            stepSize: 1,
                            callback: formatHour,
                            color: '#94a3b8',
                            font: { size: 11 },
                            maxRotation: 45,
                            autoSkip: true,
                            autoSkipPadding: 10,
                        },
                        grid: { color: '#334155', lineWidth: 0.5 },
                        title: { display: true, text: 'Time of Day (Central)', color: '#e2e8f0', font: { size: 13 } }
                    },
                    y: {
                        min: 0,
                        ticks: { color: '#94a3b8', font: { size: 11 } },
                        grid: { color: '#334155', lineWidth: 0.5 },
                        title: { display: true, text: 'Wait Time (minutes)', color: '#e2e8f0', font: { size: 13 } }
                    }
                }
            };
        }

        async function loadData() {
            const res = await fetch('iah-wait-times.log?t=' + Date.now());
            const text = await res.text();
            const lines = text.trim().split('\n').filter(l => l.trim());

            const { todayStr, yesterdayStr } = getCentralDays();
            const todayTerminals = {};
            const yesterdayTerminals = {};

            for (const line of lines) {
                const tsMatch = line.match(/^(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2})/);
                if (!tsMatch) continue;

                const ptDate = new Date(tsMatch[1] + 'T' + tsMatch[2] + '-07:00');
                const ctDay = toCentralDateStr(ptDate);

                let bucket = null;
                if (ctDay === todayStr) bucket = todayTerminals;
                else if (ctDay === yesterdayStr) bucket = yesterdayTerminals;
                else continue;

                const ctHours = toCentralHours(ptDate);

                const rest = line.substring(19).trim();
                for (const entry of rest.split('  |  ')) {
                    const minMatch = entry.trim().match(/(.+?):\s*(\d+)\s*min/);
                    if (minMatch) {
                        const name = minMatch[1].trim();
                        if (!bucket[name]) bucket[name] = [];
                        bucket[name].push({ x: ctHours, y: parseInt(minMatch[2]) });
                    }
                }
            }

            // Update status
            const lastLine = lines[lines.length - 1];
            const lastTs = lastLine.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
            if (lastTs) {
                const pt = new Date(lastTs[1].replace(' ', 'T') + '-07:00');
                document.getElementById('last-updated').textContent = pt.toLocaleString('en-US', {
                    timeZone: 'America/Chicago',
                    month: 'short', day: 'numeric',
                    hour: 'numeric', minute: '2-digit', hour12: true
                });
            }

            // Current wait cards
            const lastRest = lastLine.substring(19).trim();
            const container = document.getElementById('current-waits');
            container.innerHTML = '';
            let hasData = false;

            for (const entry of lastRest.split('  |  ')) {
                const minMatch = entry.trim().match(/(.+?):\s*(\d+)\s*min/);
                const closedMatch = entry.trim().match(/(.+?):\s*CLOSED/);
                if (minMatch) {
                    hasData = true;
                    const name = minMatch[1].trim().replace('IAH ', '');
                    const mins = parseInt(minMatch[2]);
                    container.innerHTML += `
                        <div class="wait-card">
                            <div class="terminal-name">${name}</div>
                            <div class="wait-value ${waitColor(mins)}">${mins}<span class="wait-unit"> min</span></div>
                        </div>`;
                } else if (closedMatch) {
                    const name = closedMatch[1].trim().replace('IAH ', '');
                    container.innerHTML += `
                        <div class="wait-card">
                            <div class="terminal-name">${name}</div>
                            <div class="wait-value wait-closed">Closed</div>
                        </div>`;
                }
            }

            document.getElementById('status').textContent = hasData ? 'Live' : 'No Data';
            document.getElementById('status').className = 'status-value' + (hasData ? ' live' : '');

            // Chart 1: Today only
            const todayDatasets = Object.keys(todayTerminals).sort().map((name, i) => ({
                label: name,
                data: todayTerminals[name],
                borderColor: COLORS[i % COLORS.length],
                backgroundColor: COLORS[i % COLORS.length] + '33',
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 6,
                tension: 0.1,
                fill: false,
            }));

            new Chart(document.getElementById('chart-today'), {
                type: 'line',
                data: { datasets: todayDatasets },
                options: makeChartOptions(),
            });

            // Chart 2: Today vs Yesterday
            const allNames = [...new Set([...Object.keys(todayTerminals), ...Object.keys(yesterdayTerminals)])].sort();
            const compareDatasets = [];

            allNames.forEach((name, i) => {
                const color = COLORS[i % COLORS.length];

                if (yesterdayTerminals[name]) {
                    compareDatasets.push({
                        label: name + ' (yesterday)',
                        data: yesterdayTerminals[name],
                        borderColor: color + '55',
                        backgroundColor: color + '11',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        tension: 0.1,
                        fill: false,
                        borderDash: [6, 3],
                        order: 2,
                    });
                }

                if (todayTerminals[name]) {
                    compareDatasets.push({
                        label: name + ' (today)',
                        data: todayTerminals[name],
                        borderColor: color,
                        backgroundColor: color + '33',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        tension: 0.1,
                        fill: false,
                        order: 1,
                    });
                }
            });

            new Chart(document.getElementById('chart-compare'), {
                type: 'line',
                data: { datasets: compareDatasets },
                options: makeChartOptions(),
            });
        }

        loadData();
    </script>
</body>
</html>
