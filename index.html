<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAH Security Wait Times</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .status-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 200px;
        }
        .status-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        .status-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .status-value.live {
            color: #4ade80;
        }
        .graph-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
        }
        .graph-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        .graph-card img {
            width: 100%;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #475569;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IAH Security Wait Times</h1>
            <p class="subtitle">George Bush Intercontinental Airport — Houston, TX</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Status</div>
                <div class="status-value live" id="status">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Last Updated (CT)</div>
                <div class="status-value" id="last-updated">Loading...</div>
            </div>
        </div>

        <div class="graph-card">
            <h2>Today's Wait Times</h2>
            <img src="iah-wait-times-today.png" alt="Today's IAH Security Wait Times Graph" id="graph">
        </div>

        <footer>
            Data sourced from <a href="https://www.fly2houston.com/iah/security/">fly2houston.com</a><br>
            Updated every 5 minutes via <a href="https://github.com/adonnell6/iah-wait-times">GitHub Actions</a>
        </footer>
    </div>

    <script>
        async function loadStatus() {
            try {
                const res = await fetch('iah-wait-times.log');
                const text = await res.text();
                const lines = text.trim().split('\n').filter(l => l.trim());
                const last = lines[lines.length - 1];

                const tsMatch = last.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
                if (tsMatch) {
                    // Parse as Pacific, convert to Central (+2h)
                    const pt = new Date(tsMatch[1].replace(' ', 'T') + '-07:00');
                    const ct = new Date(pt.getTime() + 2 * 60 * 60 * 1000);
                    const h = ct.getHours();
                    const m = String(ct.getMinutes()).padStart(2, '0');
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    const h12 = h % 12 || 12;
                    document.getElementById('last-updated').textContent =
                        `${ct.toLocaleDateString('en-US', {month: 'short', day: 'numeric'})} ${h12}:${m} ${ampm}`;
                }

                const hasData = last.includes('min');
                document.getElementById('status').textContent = hasData ? 'Live' : 'No Data';
                document.getElementById('status').className = 'status-value' + (hasData ? ' live' : '');

                // Cache-bust the graph
                document.getElementById('graph').src = 'iah-wait-times-today.png?t=' + Date.now();
            } catch (e) {
                document.getElementById('status').textContent = 'Error';
                document.getElementById('last-updated').textContent = 'Unavailable';
            }
        }
        loadStatus();
    </script>
</body>
</html>
